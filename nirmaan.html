<style>
/* ── Desktop chat modal ───────────────────────────────── */
#chat-modal {
    display: none;
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 370px;
    height: 540px;
    max-height: calc(100vh - 110px);
    background: var(--bg2, #0D0E1A);
    border-radius: 20px;
    border: 1px solid var(--b, #232646);
    box-shadow: 0 24px 64px rgba(0,0,0,0.45);
    z-index: 10001;
    overflow: hidden;
    font-family: var(--fb, 'General Sans', sans-serif);
    color: var(--t, #E8E9FF);
    transition: box-shadow 0.2s;
}
#chat-modal.open {
    display: flex;
    flex-direction: column;
    animation: chatSlideUp 0.3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes chatSlideUp {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Header ──────────────────────────────────────────── */
.chat-header {
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
    flex-shrink: 0;
}
.chat-header .bot-icon {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
}
.chat-header-title { font-size: 14px; font-weight: 600; }
.chat-header-status {
    width: 8px; height: 8px;
    background: #10B981; border-radius: 50%;
    margin-left: auto; flex-shrink: 0;
    animation: chatPulse 2s infinite;
}
@keyframes chatPulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* ── Messages ─────────────────────────────────────────── */
.chat-messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg, #0D0E1A);
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--b, #232646); border-radius: 4px; }

.chat-msg {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 13px;
    line-height: 1.55;
    word-break: break-word;
}
.chat-msg.user {
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}
.chat-msg.bot {
    background: var(--bg3, #232646);
    color: var(--t, #E8E9FF);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

/* ── Typing indicator ─────────────────────────────────── */
.chat-typing {
    display: flex; gap: 5px;
    padding: 12px 16px;
    background: var(--bg3, #232646);
    border-radius: 18px;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}
.chat-typing span {
    width: 7px; height: 7px;
    background: var(--t3, #9295B8);
    border-radius: 50%;
    animation: chatBounce 1.4s infinite;
}
.chat-typing span:nth-child(2){animation-delay:.2s;}
.chat-typing span:nth-child(3){animation-delay:.4s;}
@keyframes chatBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}

/* ── Input area ───────────────────────────────────────── */
.chat-input-area {
    padding: 10px 12px;
    background: var(--bg2, #181A32);
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid var(--b, #232646);
    flex-shrink: 0;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
}
.chat-input {
    flex: 1;
    padding: 11px 15px;
    border: none;
    border-radius: 24px;
    background: var(--bg3, #232646);
    color: var(--t, #E8E9FF);
    font-size: 14px;
    outline: none;
    font-family: inherit;
    min-width: 0;
    -webkit-appearance: none;
}
.chat-input::placeholder { color: var(--t3, #9295B8); }
.chat-mic-btn, .chat-send-btn {
    width: 42px; height: 42px;
    border-radius: 50%; border: none;
    background: #6366F1; color: white;
    font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
}
.chat-mic-btn:active, .chat-send-btn:active { transform: scale(0.92); }
.chat-mic-btn:hover, .chat-send-btn:hover { background: #4F46E5; }
.chat-mic-btn.listening { background: #EF4444; animation: chatPulseRing 1s infinite; }
@keyframes chatPulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
    70%  { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

/* ── Close button ─────────────────────────────────────── */
.chat-close {
    background: none; border: none;
    color: white; font-size: 22px;
    cursor: pointer; opacity: 0.85;
    padding: 0 0 0 4px;
    line-height: 1;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
}
.chat-close:hover { opacity: 1; }

/* ── FAB button ───────────────────────────────────────── */
#chat-fab-external {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    right: 20px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    color: white; font-size: 24px;
    border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(99,102,241,0.45);
    z-index: 9999;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.2s;
}
#chat-fab-external:active { transform: scale(0.9); }

/* ── MOBILE: full-screen bottom sheet ────────────────── */
@media (max-width: 600px) {
    /* mob-nav is 60px + safe-area-inset-bottom — sit above it */
    #chat-modal {
        bottom: calc(60px + env(safe-area-inset-bottom, 0px)) !important;
        right: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: calc(100dvh - 60px - env(safe-area-inset-bottom, 0px) - env(safe-area-inset-top, 0px)) !important;
        max-height: calc(100dvh - 60px - env(safe-area-inset-bottom, 0px)) !important;
        border-radius: 24px 24px 0 0 !important;
        border-bottom: none !important;
    }
    @keyframes chatSlideUp {
        from { opacity: 0; transform: translateY(100%); }
        to   { opacity: 1; transform: translateY(0); }
    }
    /* drag handle */
    .chat-header {
        position: relative;
        padding: 20px 18px 14px;
    }
    .chat-header::before {
        content: '';
        position: absolute;
        top: 8px; left: 50%;
        transform: translateX(-50%);
        width: 36px; height: 4px;
        background: rgba(255,255,255,0.35);
        border-radius: 4px;
    }
    .chat-header-title { font-size: 15px; }
    .chat-header .bot-icon { width: 36px; height: 36px; font-size: 20px; }
    .chat-messages { padding: 16px; gap: 12px; }
    .chat-msg { font-size: 14px; padding: 12px 16px; max-width: 88%; }
    .chat-input-area {
        padding: 12px 14px;
        gap: 10px;
    }
    .chat-input { font-size: 15px; padding: 13px 16px; }
    .chat-mic-btn, .chat-send-btn { width: 46px; height: 46px; font-size: 19px; }

    /* FAB: 60px nav + 12px breathing room above it */
    #chat-fab-external {
        bottom: calc(60px + env(safe-area-inset-bottom, 0px) + 12px) !important;
        right: 16px;
        width: 52px; height: 52px;
        font-size: 22px;
    }
}
</style>

// ── Detect language from nirmaan.js state ─────────────────
function getChatLang() {
    try { return (typeof S !== 'undefined' && S.lang === 'hi') ? 'hi' : 'en'; } catch(e) { return 'en'; }
}

function getLang() { return CHAT_LANG[getChatLang()]; }

// ── Init welcome message based on current language ────────
function initChatWelcome() {
    var container = document.getElementById('chat-messages');
    container.innerHTML = '';
    addChatMsg(getLang().welcome, 'bot');
    // Update UI text
    document.getElementById('chat-title').textContent = getLang().title;
    document.getElementById('chat-input').placeholder = getLang().placeholder;
    if (chatRecognition) chatRecognition.lang = getChatLang() === 'hi' ? 'hi-IN' : 'en-US';
}

// ── Speech recognition ────────────────────────────────────
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    chatRecognition = new SpeechRecognition();
    chatRecognition.continuous = false;
    chatRecognition.interimResults = true;
    chatRecognition.lang = 'en-US';
    chatRecognition.onresult = function(event) {
        var transcript = '';
        for (var i = 0; i < event.results.length; i++) transcript += event.results[i][0].transcript;
        document.getElementById('chat-input').value = transcript;
        if (event.results[0].isFinal) sendChatMsg();
    };
    chatRecognition.onend = function() {
        chatListening = false;
        document.getElementById('chat-mic').classList.remove('listening');
    };
}

function toggleChat() {
    chatOpen = !chatOpen;
    var modal = document.getElementById('chat-modal');
    modal.classList.toggle('open', chatOpen);
    if (chatOpen) initChatWelcome(); // refresh language each time opened
}

function toggleChatMic() {
    if (!chatRecognition) { addChatMsg(getLang().voiceError, 'bot'); return; }
    if (chatListening) { chatRecognition.stop(); }
    else {
        chatRecognition.lang = getChatLang() === 'hi' ? 'hi-IN' : 'en-US';
        chatRecognition.start();
        chatListening = true;
        document.getElementById('chat-mic').classList.add('listening');
    }
}

function addChatMsg(text, sender) {
    var container = document.getElementById('chat-messages');
    var msg = document.createElement('div');
    msg.className = 'chat-msg ' + sender;
    msg.textContent = text;
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
}

function showChatTyping() {
    var container = document.getElementById('chat-messages');
    var typing = document.createElement('div');
    typing.className = 'chat-typing'; typing.id = 'chat-typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;
}

function hideChatTyping() { var t = document.getElementById('chat-typing'); if (t) t.remove(); }

function chatSpeak(text) {
    if (!chatVoiceEnabled) return;
    var utt = new SpeechSynthesisUtterance(text);
    utt.lang = getChatLang() === 'hi' ? 'hi-IN' : 'en-US';
    speechSynthesis.speak(utt);
}

function getChatResponse(query) {
    var q = query.toLowerCase();
    var kb = getLang().kb;
    for (var key in kb) { if (q.includes(key)) return kb[key]; }
    return getLang().fallback;
}

function sendChatMsg() {
    var input = document.getElementById('chat-input');
    var message = input.value.trim();
    if (!message) return;
    addChatMsg(message, 'user');
    input.value = '';
    showChatTyping();
    setTimeout(function() {
        hideChatTyping();
        var response = getChatResponse(message);
        addChatMsg(response, 'bot');
        chatSpeak(response);
    }, 800);
}

// ── Bridge: Navbar 🎙️ → opens chatbot + activates mic ────
function navVoiceToChat() {
    // Open chatbot if not already open
    if (!chatOpen) {
        chatOpen = true;
        document.getElementById('chat-modal').classList.add('open');
        initChatWelcome();
    }
    // Brief delay so modal is visible, then fire mic
    setTimeout(function() {
        toggleChatMic();
    }, 350);
}
// Expose globally so nirmaan.js rendered buttons can call it
window.navVoiceToChat = navVoiceToChat;

// ── Floating 💬 button ────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    // Set initial welcome
    initChatWelcome();

    var fab = document.createElement('button');
    fab.innerHTML = '💬';
    fab.id = 'chat-fab-external';
    fab.onclick = toggleChat;
    document.body.appendChild(fab);

    // Keep fab title in sync with language
    setInterval(function() {
        fab.title = getLang().fabTitle;
    }, 1000);
});
</script>


<!-- ══════════════════════════════════════════════════════
     NIRMAAN LANDING ANIMATION  ·  hero canvas + effects
     ══════════════════════════════════════════════════════ -->
<style>
/* ── Canvas layer ──────────────────────────────────────── */
#hero-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  transition: opacity 1.2s ease;
}
#hero-canvas.visible { opacity: 1; }

/* ── Typewriter cursor ─────────────────────────────────── */
.tw-cursor {
  display: inline-block;
  width: 3px;
  height: 0.85em;
  background: var(--p);
  border-radius: 2px;
  margin-left: 3px;
  vertical-align: middle;
  animation: twBlink 0.9s ease-in-out infinite;
}
@keyframes twBlink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Floating card polish ──────────────────────────────── */
.hfl {
  backdrop-filter: blur(8px) saturate(1.4);
  -webkit-backdrop-filter: blur(8px) saturate(1.4);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.hfl:hover {
  transform: translateY(-4px) !important;
  box-shadow: 0 8px 28px rgba(99,102,241,0.18) !important;
}

/* ── Glowing orb behind hero title ────────────────────── */
.hero-orb {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -60%);
  width: min(600px, 90vw);
  height: min(400px, 60vw);
  border-radius: 50%;
  background: radial-gradient(ellipse at center,
    rgba(99,102,241,0.13) 0%,
    rgba(139,92,246,0.07) 40%,
    transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: orbPulse 6s ease-in-out infinite;
}
@keyframes orbPulse {
  0%,100% { opacity:0.7; transform:translate(-50%,-60%) scale(1); }
  50%      { opacity:1;   transform:translate(-50%,-60%) scale(1.08); }
}

/* ── Stagger-in for stats ──────────────────────────────── */
.stat-item {
  animation: fup .55s ease both;
  opacity: 0;
}

/* ── Shimmer on CTA button ─────────────────────────────── */
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
.btn-cta-shimmer {
  background-size: 200% auto !important;
  animation: shimmer 3s linear infinite;
}

/* ── Ripple on click ───────────────────────────────────── */
@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}
.ripple-effect {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  width: 40px; height: 40px;
  transform: scale(0);
  animation: ripple 0.55s linear;
  pointer-events: none;
  margin-left: -20px;
  margin-top: -20px;
}
</style>

<script>
/* ── Run after nirmaan.js render ─────────────────────── */
(function initHeroAnim() {

  /* Wait for the hero section to be rendered */
  function tryInit() {
    const hero = document.querySelector('.hero');
    if (!hero) { setTimeout(tryInit, 120); return; }
    injectOrb(hero);
    injectCanvas(hero);
    initTypewriter();
    initStaggerStats();
    initCtaShimmer();
    initRipples();
  }

  /* ─ Glowing orb ─ */
  function injectOrb(hero) {
    if (hero.querySelector('.hero-orb')) return;
    const orb = document.createElement('div');
    orb.className = 'hero-orb';
    hero.insertBefore(orb, hero.firstChild);
  }

  /* ─ Particle canvas ─ */
  function injectCanvas(hero) {
    if (hero.querySelector('#hero-canvas')) return;
    const canvas = document.createElement('canvas');
    canvas.id = 'hero-canvas';
    hero.insertBefore(canvas, hero.firstChild);

    const W = () => hero.offsetWidth;
    const H = () => hero.offsetHeight;
    const ctx = canvas.getContext('2d');
    const isDark = () => document.documentElement.getAttribute('data-theme') === 'dark';

    let particles = [];
    const COUNT = Math.min(55, Math.floor(W() / 18));

    function resize() {
      canvas.width  = W();
      canvas.height = H();
    }
    resize();
    window.addEventListener('resize', () => { resize(); });

    /* Particle factory */
    function mkParticle() {
      return {
        x: Math.random() * W(),
        y: Math.random() * H(),
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        r: Math.random() * 1.8 + 0.6,
        alpha: Math.random() * 0.5 + 0.2,
        color: Math.random() < 0.6 ? '#6366F1' : '#8B5CF6',
      };
    }
    for (let i = 0; i < COUNT; i++) particles.push(mkParticle());

    /* Draw loop */
    const LINK_DIST = 120;
    function draw() {
      ctx.clearRect(0, 0, W(), H());
      const dark = isDark();

      /* Connections */
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < LINK_DIST) {
            const alpha = (1 - d / LINK_DIST) * (dark ? 0.22 : 0.13);
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(99,102,241,${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      /* Dots */
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + Math.round(p.alpha * 255).toString(16).padStart(2,'0');
        ctx.fill();

        /* Move */
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > W()) p.vx *= -1;
        if (p.y < 0 || p.y > H()) p.vy *= -1;
      });

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
    setTimeout(() => canvas.classList.add('visible'), 60);
  }

  /* ─ Typewriter on hero h1 ─ */
  function initTypewriter() {
    const h1 = document.querySelector('.hero h1');
    if (!h1 || h1.dataset.tw) return;
    h1.dataset.tw = '1';

    /* grab the gradient span text and plain text separately */
    const gradSpan = h1.querySelector('span[style]');
    if (!gradSpan) return;

    const afterBr = h1.innerHTML.split('<br>')[1] || '';
    if (!afterBr) return;

    /* Only animate the suffix text after <br> */
    const suffix = afterBr.replace(/<[^>]*>/g, '').trim();
    const prefix = h1.innerHTML.split('<br>')[0] + '<br>';

    h1.innerHTML = prefix + '<span id="tw-text"></span><span class="tw-cursor"></span>';
    const target = document.getElementById('tw-text');
    if (!target) return;

    let i = 0;
    function type() {
      if (i <= suffix.length) {
        target.textContent = suffix.slice(0, i);
        i++;
        setTimeout(type, i === 1 ? 600 : 38 + Math.random() * 22);
      } else {
        /* Remove cursor after done */
        setTimeout(() => {
          const cursor = h1.querySelector('.tw-cursor');
          if (cursor) cursor.style.display = 'none';
        }, 1800);
      }
    }
    setTimeout(type, 700);
  }

  /* ─ Staggered stat items ─ */
  function initStaggerStats() {
    document.querySelectorAll('.hero [style*="text-align:center"]').forEach((el, i) => {
      if (el.querySelector('[style*="font-size:1.9rem"]') || el.style.fontSize === '1.9rem') {
        el.classList.add('stat-item');
        el.style.animationDelay = (0.55 + i * 0.1) + 's';
      }
    });
  }

  /* ─ Shimmer on primary CTA ─ */
  function initCtaShimmer() {
    const btn = document.querySelector('.hero .btn-p');
    if (!btn) return;
    btn.style.background = 'linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #6366F1 100%)';
    btn.style.backgroundSize = '200% auto';
    btn.style.animation = 'shimmer 3s linear infinite';
  }

  /* ─ Ripple effect on all buttons ─ */
  function initRipples() {
    document.querySelectorAll('.hero .btn').forEach(btn => {
      btn.style.position = 'relative';
      btn.style.overflow = 'hidden';
      btn.addEventListener('click', function(e) {
        const r = document.createElement('span');
        r.className = 'ripple-effect';
        const rect = this.getBoundingClientRect();
        r.style.left = (e.clientX - rect.left) + 'px';
        r.style.top  = (e.clientY - rect.top)  + 'px';
        this.appendChild(r);
        setTimeout(() => r.remove(), 600);
      });
    });
  }

  /* ── Re-run after every render() since DOM is rebuilt ── */
  const _origRender = window.render;
  if (_origRender) {
    window.render = function() {
      _origRender.apply(this, arguments);
      if (typeof S !== 'undefined' && S.page === 'home') {
        setTimeout(tryInit, 60);
      }
    };
  }

  /* First run */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(tryInit, 200));
  } else {
    setTimeout(tryInit, 200);
  }

})();
</script>

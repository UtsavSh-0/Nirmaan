<style>
/* ── Desktop chat modal ───────────────────────────────── */
#chat-modal {
    display: none;
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 370px;
    height: 540px;
    max-height: calc(100vh - 110px);
    background: var(--bg2, #0D0E1A);
    border-radius: 20px;
    border: 1px solid var(--b, #232646);
    box-shadow: 0 24px 64px rgba(0,0,0,0.45);
    z-index: 10001;
    overflow: hidden;
    font-family: var(--fb, 'General Sans', sans-serif);
    color: var(--t, #E8E9FF);
    transition: box-shadow 0.2s;
}
#chat-modal.open {
    display: flex;
    flex-direction: column;
    animation: chatSlideUp 0.3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes chatSlideUp {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Header ──────────────────────────────────────────── */
.chat-header {
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
    flex-shrink: 0;
}
.chat-header .bot-icon {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
}
.chat-header-title { font-size: 14px; font-weight: 600; }
.chat-header-status {
    width: 8px; height: 8px;
    background: #10B981; border-radius: 50%;
    margin-left: auto; flex-shrink: 0;
    animation: chatPulse 2s infinite;
}
@keyframes chatPulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* ── Messages ─────────────────────────────────────────── */
.chat-messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg, #0D0E1A);
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--b, #232646); border-radius: 4px; }

.chat-msg {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 13px;
    line-height: 1.55;
    word-break: break-word;
}
.chat-msg.user {
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}
.chat-msg.bot {
    background: var(--bg3, #232646);
    color: var(--t, #E8E9FF);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

/* ── Typing indicator ─────────────────────────────────── */
.chat-typing {
    display: flex; gap: 5px;
    padding: 12px 16px;
    background: var(--bg3, #232646);
    border-radius: 18px;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}
.chat-typing span {
    width: 7px; height: 7px;
    background: var(--t3, #9295B8);
    border-radius: 50%;
    animation: chatBounce 1.4s infinite;
}
.chat-typing span:nth-child(2){animation-delay:.2s;}
.chat-typing span:nth-child(3){animation-delay:.4s;}
@keyframes chatBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}

/* ── Input area ───────────────────────────────────────── */
.chat-input-area {
    padding: 10px 12px;
    background: var(--bg2, #181A32);
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid var(--b, #232646);
    flex-shrink: 0;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
}
.chat-input {
    flex: 1;
    padding: 11px 15px;
    border: none;
    border-radius: 24px;
    background: var(--bg3, #232646);
    color: var(--t, #E8E9FF);
    font-size: 14px;
    outline: none;
    font-family: inherit;
    min-width: 0;
    -webkit-appearance: none;
}
.chat-input::placeholder { color: var(--t3, #9295B8); }
.chat-mic-btn, .chat-send-btn {
    width: 42px; height: 42px;
    border-radius: 50%; border: none;
    background: #6366F1; color: white;
    font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
}
.chat-mic-btn:active, .chat-send-btn:active { transform: scale(0.92); }
.chat-mic-btn:hover, .chat-send-btn:hover { background: #4F46E5; }
.chat-mic-btn.listening { background: #EF4444; animation: chatPulseRing 1s infinite; }
@keyframes chatPulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
    70%  { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

/* ── Close button ─────────────────────────────────────── */
.chat-close {
    background: none; border: none;
    color: white; font-size: 22px;
    cursor: pointer; opacity: 0.85;
    padding: 0 0 0 4px;
    line-height: 1;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
}
.chat-close:hover { opacity: 1; }

/* ── FAB button ───────────────────────────────────────── */
#chat-fab-external {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    right: 20px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    color: white; font-size: 24px;
    border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(99,102,241,0.45);
    z-index: 9999;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.2s;
}
#chat-fab-external:active { transform: scale(0.9); }

/* ── MOBILE: full-screen bottom sheet ────────────────── */
@media (max-width: 600px) {
    /* mob-nav is 60px + safe-area-inset-bottom — sit above it */
    #chat-modal {
        bottom: calc(60px + env(safe-area-inset-bottom, 0px)) !important;
        right: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: calc(100dvh - 60px - env(safe-area-inset-bottom, 0px) - env(safe-area-inset-top, 0px)) !important;
        max-height: calc(100dvh - 60px - env(safe-area-inset-bottom, 0px)) !important;
        border-radius: 24px 24px 0 0 !important;
        border-bottom: none !important;
    }
    @keyframes chatSlideUp {
        from { opacity: 0; transform: translateY(100%); }
        to   { opacity: 1; transform: translateY(0); }
    }
    /* drag handle */
    .chat-header {
        position: relative;
        padding: 20px 18px 14px;
    }
    .chat-header::before {
        content: '';
        position: absolute;
        top: 8px; left: 50%;
        transform: translateX(-50%);
        width: 36px; height: 4px;
        background: rgba(255,255,255,0.35);
        border-radius: 4px;
    }
    .chat-header-title { font-size: 15px; }
    .chat-header .bot-icon { width: 36px; height: 36px; font-size: 20px; }
    .chat-messages { padding: 16px; gap: 12px; }
    .chat-msg { font-size: 14px; padding: 12px 16px; max-width: 88%; }
    .chat-input-area {
        padding: 12px 14px;
        gap: 10px;
    }
    .chat-input { font-size: 15px; padding: 13px 16px; }
    .chat-mic-btn, .chat-send-btn { width: 46px; height: 46px; font-size: 19px; }

    /* FAB: 60px nav + 12px breathing room above it */
    #chat-fab-external {
        bottom: calc(60px + env(safe-area-inset-bottom, 0px) + 12px) !important;
        right: 16px;
        width: 52px; height: 52px;
        font-size: 22px;
    }
}
</style>

// ── Detect language from nirmaan.js state ─────────────────
function getChatLang() {
    try { return (typeof S !== 'undefined' && S.lang === 'hi') ? 'hi' : 'en'; } catch(e) { return 'en'; }
}

function getLang() { return CHAT_LANG[getChatLang()]; }

// ── Init welcome message based on current language ────────
function initChatWelcome() {
    var container = document.getElementById('chat-messages');
    container.innerHTML = '';
    addChatMsg(getLang().welcome, 'bot');
    // Update UI text
    document.getElementById('chat-title').textContent = getLang().title;
    document.getElementById('chat-input').placeholder = getLang().placeholder;
    if (chatRecognition) chatRecognition.lang = getChatLang() === 'hi' ? 'hi-IN' : 'en-US';
}

// ── Speech recognition ────────────────────────────────────
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    chatRecognition = new SpeechRecognition();
    chatRecognition.continuous = false;
    chatRecognition.interimResults = true;
    chatRecognition.lang = 'en-US';
    chatRecognition.onresult = function(event) {
        var transcript = '';
        for (var i = 0; i < event.results.length; i++) transcript += event.results[i][0].transcript;
        document.getElementById('chat-input').value = transcript;
        if (event.results[0].isFinal) sendChatMsg();
    };
    chatRecognition.onend = function() {
        chatListening = false;
        document.getElementById('chat-mic').classList.remove('listening');
    };
}

function toggleChat() {
    chatOpen = !chatOpen;
    var modal = document.getElementById('chat-modal');
    modal.classList.toggle('open', chatOpen);
    if (chatOpen) initChatWelcome(); // refresh language each time opened
}

function toggleChatMic() {
    if (!chatRecognition) { addChatMsg(getLang().voiceError, 'bot'); return; }
    if (chatListening) { chatRecognition.stop(); }
    else {
        chatRecognition.lang = getChatLang() === 'hi' ? 'hi-IN' : 'en-US';
        chatRecognition.start();
        chatListening = true;
        document.getElementById('chat-mic').classList.add('listening');
    }
}

function addChatMsg(text, sender) {
    var container = document.getElementById('chat-messages');
    var msg = document.createElement('div');
    msg.className = 'chat-msg ' + sender;
    msg.textContent = text;
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
}

function showChatTyping() {
    var container = document.getElementById('chat-messages');
    var typing = document.createElement('div');
    typing.className = 'chat-typing'; typing.id = 'chat-typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;
}

function hideChatTyping() { var t = document.getElementById('chat-typing'); if (t) t.remove(); }

function chatSpeak(text) {
    if (!chatVoiceEnabled) return;
    var utt = new SpeechSynthesisUtterance(text);
    utt.lang = getChatLang() === 'hi' ? 'hi-IN' : 'en-US';
    speechSynthesis.speak(utt);
}

function getChatResponse(query) {
    var q = query.toLowerCase();
    var kb = getLang().kb;
    for (var key in kb) { if (q.includes(key)) return kb[key]; }
    return getLang().fallback;
}

function sendChatMsg() {
    var input = document.getElementById('chat-input');
    var message = input.value.trim();
    if (!message) return;
    addChatMsg(message, 'user');
    input.value = '';
    showChatTyping();
    setTimeout(function() {
        hideChatTyping();
        var response = getChatResponse(message);
        addChatMsg(response, 'bot');
        chatSpeak(response);
    }, 800);
}

// ── Bridge: Navbar 🎙️ → opens chatbot + activates mic ────
function navVoiceToChat() {
    // Open chatbot if not already open
    if (!chatOpen) {
        chatOpen = true;
        document.getElementById('chat-modal').classList.add('open');
        initChatWelcome();
    }
    // Brief delay so modal is visible, then fire mic
    setTimeout(function() {
        toggleChatMic();
    }, 350);
}
// Expose globally so nirmaan.js rendered buttons can call it
window.navVoiceToChat = navVoiceToChat;

// ── Floating 💬 button ────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    // Set initial welcome
    initChatWelcome();

    var fab = document.createElement('button');
    fab.innerHTML = '💬';
    fab.id = 'chat-fab-external';
    fab.onclick = toggleChat;
    document.body.appendChild(fab);

    // Keep fab title in sync with language
    setInterval(function() {
        fab.title = getLang().fabTitle;
    }, 1000);
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#6366F1"/>
<title>Nirmaan v3 – AI Internship Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=General+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="nirmaan.css"/>
<style>
/* Chatbot Modal Styles - Uses app CSS variables for dark/light mode */
#chat-modal {
    display: none;
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 380px;
    height: 520px;
    background: var(--bg2, #0D0E1A);
    border-radius: 16px;
    border: 1px solid var(--b, #232646);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    z-index: 10001;
    overflow: hidden;
    font-family: var(--fb, 'General Sans', sans-serif);
    color: var(--t, #E8E9FF);
}
#chat-modal.open {
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s ease;
}
@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.chat-header {
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
}
.chat-header .bot-icon {
    width: 32px;
    height: 32px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}
.chat-header-title {
    font-size: 14px;
    font-weight: 600;
}
.chat-header-status {
    width: 8px;
    height: 8px;
    background: #10B981;
    border-radius: 50%;
    margin-left: auto;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}
.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--bg, #0D0E1A);
}
.chat-msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.5;
}
.chat-msg.user {
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}
.chat-msg.bot {
    background: var(--bg3, #232646);
    color: var(--t, #E8E9FF);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}
.chat-typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bg3, #232646);
    border-radius: 16px;
    align-self: flex-start;
}
.chat-typing span {
    width: 8px;
    height: 8px;
    background: var(--t3, #9295B8);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
}
.chat-typing span:nth-child(2) { animation-delay: 0.2s; }
.chat-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
}
.chat-input-area {
    padding: 12px 16px;
    background: var(--bg2, #181A32);
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--b, #232646);
}
.chat-input {
    flex: 1;
    padding: 12px 16px;
    border: none;
    border-radius: 24px;
    background: var(--bg3, #232646);
    color: var(--t, #E8E9FF);
    font-size: 13px;
    outline: none;
    font-family: inherit;
}
.chat-input::placeholder {
    color: var(--t3, #9295B8);
}
.chat-mic-btn, .chat-send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #6366F1;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}
.chat-mic-btn:hover, .chat-send-btn:hover {
    background: #4F46E5;
}
.chat-mic-btn.listening {
    background: #EF4444;
    animation: pulse-ring 1s infinite;
}
@keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
    70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}
.chat-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    opacity: 0.8;
}
.chat-close:hover { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script src="nirmaan.js" onerror="console.error('Failed to load nirmaan.js!')"></script>
<script>
setTimeout(function() {
    if (typeof render === 'function' && document.getElementById('root').innerHTML.trim() === '') {
        render();
    }
}, 100);
</script>

<!-- Embedded Chatbot -->
<div id="chat-modal">
    <div class="chat-header">
        <div class="bot-icon">🤖</div>
        <span class="chat-header-title">AI Assistant</span>
        <div class="chat-header-status"></div>
        <button class="chat-close" onclick="toggleChat()">×</button>
    </div>
    <div class="chat-messages" id="chat-messages">
        <div class="chat-msg bot">Hello! I'm your AI assistant. Type or speak your questions. How can I help?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chat-input" placeholder="Type your message..." onkeypress="if(event.key==='Enter')sendChatMsg()">
        <button class="chat-mic-btn" id="chat-mic" onclick="toggleChatMic()">🎤</button>
        <button class="chat-send-btn" onclick="sendChatMsg()">➤</button>
    </div>
</div>

<script>
// Chatbot Logic
var chatOpen = false;
var chatRecognition = null;
var chatListening = false;
var chatVoiceEnabled = true;

// Initialize speech recognition
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    chatRecognition = new SpeechRecognition();
    chatRecognition.continuous = false;
    chatRecognition.interimResults = true;
    chatRecognition.lang = 'en-US';
    chatRecognition.onresult = function(event) {
        var transcript = '';
        for (var i = 0; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        document.getElementById('chat-input').value = transcript;
        if (event.results[0].isFinal) {
            sendChatMsg();
        }
    };
    chatRecognition.onend = function() {
        chatListening = false;
        document.getElementById('chat-mic').classList.remove('listening');
    };
}

function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById('chat-modal').classList.toggle('open', chatOpen);
}

function toggleChatMic() {
    if (!chatRecognition) {
        addChatMsg("Voice not supported in this browser. Use Chrome.", 'bot');
        return;
    }
    if (chatListening) {
        chatRecognition.stop();
    } else {
        chatRecognition.start();
        chatListening = true;
        document.getElementById('chat-mic').classList.add('listening');
    }
}

function addChatMsg(text, sender) {
    var container = document.getElementById('chat-messages');
    var msg = document.createElement('div');
    msg.className = 'chat-msg ' + sender;
    msg.textContent = text;
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
}

function showChatTyping() {
    var container = document.getElementById('chat-messages');
    var typing = document.createElement('div');
    typing.className = 'chat-typing';
    typing.id = 'chat-typing';
    typing.innerHTML = '<span></span><span></span><span></span';
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;
}

function hideChatTyping() {
    var typing = document.getElementById('chat-typing');
    if (typing) typing.remove();
}

function chatSpeak(text) {
    if (!chatVoiceEnabled) return;
    var utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 1;
    speechSynthesis.speak(utterance);
}

function getChatResponse(query) {
    var q = query.toLowerCase();
    var kb = {
        'hello': 'Hello! How can I assist you today?',
        'hi': 'Hi there! What can I help you with?',
        'hey': 'Hey! How can I help you?',
        'who are you': 'I am an AI assistant designed to help answer questions about Nirmaan platform, internships, and more.',
        'what can you do': 'I can answer questions about: AI matching, skill gaps, resume building, internships, careers, and general knowledge.',
        'help': 'I can help with AI matching, skill gap analysis, roadmap generation, resume building, and finding internships.',
        'internship': 'Nirmaan helps you find AI-matched internships. Go to "AI Matches" to see recommended opportunities based on your skills.',
        'resume': 'Use the Resume Builder in your dashboard to create professional resumes with AI optimization.',
        'skill': 'Add skills in your profile to improve AI matching. The Skill Gap feature shows what you need to learn.',
        'job': 'Internships are different from jobs - they are entry-level positions for students. Nirmaan focuses on internship matching.',
        'ai': 'Nirmaan uses AI to match students with internships based on skills, interests, and career goals.',
        'thank': 'You\'re welcome! Let me know if you need anything else.',
        'thanks': 'No problem! Happy to help.',
        'bye': 'Goodbye! Feel free to come back anytime.',
        'time': 'Time is a continuous progression of events from past to present to future.',
        'date': 'Today is May 17, 2026.',
        'python': 'Python is a popular programming language used in AI, web development, and data science.',
        'javascript': 'JavaScript is a programming language for web development, enabling interactive websites.',
        'java': 'Java is a widely-used programming language for enterprise applications and Android development.',
        'react': 'React is a JavaScript library for building user interfaces, particularly single-page applications.',
        'thanks': 'You\'re welcome!',
        'thank you': 'Happy to help!',
    };
    for (var key in kb) {
        if (q.includes(key)) return kb[key];
    }
    return "That's a great question! I can help with topics like internships, AI matching, skill gaps, resume building, and coding. What would you like to know?";
}

function sendChatMsg() {
    var input = document.getElementById('chat-input');
    var message = input.value.trim();
    if (!message) return;
    addChatMsg(message, 'user');
    input.value = '';
    showChatTyping();
    setTimeout(function() {
        hideChatTyping();
        var response = getChatResponse(message);
        addChatMsg(response, 'bot');
        chatSpeak(response);
    }, 800);
}

// Floating button
document.addEventListener('DOMContentLoaded', function() {
    var fab = document.createElement('button');
    fab.innerHTML = '💬';
    fab.title = 'Open AI Chat';
    fab.style.cssText = 'position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:white;font-size:24px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,0.4);z-index:9999;font-family:system-ui;';
    fab.onclick = function() {
        toggleChat();
    };
    document.body.appendChild(fab);
});
</script>
</body>
</html>
